<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Casino Ganamos — Hablar con Cajero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#05010a;

      /* verde premium */
      --greenTop:#49e46c;
      --greenMid:#22c55e;
      --greenBot:#159a47;

      --text:#f5f5f5;
      --muted:#a0a0b5;

      --shadowSoft: 0 18px 45px rgba(0,0,0,.70);
      --border: 1px solid rgba(255,255,255,.12);

      /* Zona limpia para cara/cuello del perro */
      --heroSafeTop: 145px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:"Poppins",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x:hidden;
    }

    /* Fondo full (subimos encuadre para que se vea MENOS cuello) */
    .bg{
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 18% 20%, rgba(34,197,94,.14), transparent 55%),
        radial-gradient(circle at 82% 22%, rgba(138,43,226,.22), transparent 58%),
        linear-gradient(180deg, rgba(5,1,10,.12) 0%, rgba(5,1,10,.55) 58%, rgba(5,1,10,.86) 100%),
        url("dog-ganamos.png");
      background-size: cover;
      background-repeat: no-repeat;
      /* 👇 antes 8%: ahora subimos más el encuadre */
      background-position: center 0%;
      filter: saturate(1.02) contrast(1.04);
      transform: none;
    }

    .vignette{
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events:none;
      background: radial-gradient(circle at center, transparent 58%, rgba(0,0,0,.55) 100%);
      opacity: .70;
    }

    .wrap{
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 14px 130px;
    }

    header{
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 6px 0 10px;
    }
    .logo{
      height: 42px; /* un poquito más */
      width:auto;
      object-fit:contain;
      filter:
        drop-shadow(0 12px 22px rgba(0,0,0,.70))
        drop-shadow(0 0 14px rgba(138,43,226,.18));
    }

    .safe-zone{ height: var(--heroSafeTop); }

    .stack{
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    /* Bono */
    .bonus-wrap{
      display:flex;
      justify-content:center;
    }
    .bonus-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration:none;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: .06em;
      font-size: .78rem;
      white-space: nowrap;
      border: 1px solid rgba(0,0,0,.75);
      background: linear-gradient(135deg, rgba(255,195,0,.95), rgba(255,85,0,.92));
      color: #0b0719;
      box-shadow: var(--shadowSoft), 0 0 18px rgba(255,130,0,.22);
      position:relative;
      overflow:hidden;
      transition: transform .14s ease, filter .14s ease, box-shadow .14s ease;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      text-shadow: 0 2px 10px rgba(255,255,255,.12);
    }
    .bonus-btn::before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(circle at 20% 0%, rgba(255,255,255,.60), transparent 58%);
      opacity:.28;
      pointer-events:none;
      mix-blend-mode: screen;
    }
    .bonus-btn:hover{ transform: translateY(-1px) scale(1.02); filter: brightness(1.02); }
    .bonus-btn:active{ transform: scale(.985); }

    /* Botón base */
    .btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 15px 14px;
      border-radius: 999px;
      text-decoration:none;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: 1px solid rgba(0,0,0,.85);
      position: relative;
      overflow:hidden;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .14s ease, filter .14s ease, box-shadow .14s ease;
      box-shadow: var(--shadowSoft), 0 0 18px rgba(34,197,94,.22);
      text-shadow: 0 2px 12px rgba(0,0,0,.55);
    }
    .btn::before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(circle at 20% 0%, rgba(255,255,255,.55), transparent 58%);
      opacity: .24;
      pointer-events:none;
      mix-blend-mode: screen;
    }
    .btn:hover{
      transform: translateY(-1px) scale(1.02);
      filter: brightness(1.02);
      box-shadow: 0 0 22px rgba(34,197,94,.28), var(--shadowSoft);
    }
    .btn:active{ transform: scale(.985); filter: brightness(1.03); }

    .btn-green{
      color:#07010b;
      background: linear-gradient(180deg, var(--greenTop) 0%, var(--greenMid) 55%, var(--greenBot) 100%);
    }

    /* Iconos */
    .ico{
      width: 22px;
      height: 22px;
      display:block;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.35));
      flex: 0 0 auto;
    }
    /* Ícono WhatsApp como imagen */
    .ico-img{
      width: 22px;
      height: 22px;
      display:block;
      flex: 0 0 auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.35));
    }

    /* mantiene el centrado que ya tenías con position absolute */
    .btn-two .btn-main .ico-img{
      position:absolute;
      left: 16px;
    }


    /* Widgets */
    .widgets{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .w{
      border-radius: 18px;
      padding: 10px 10px;
      background: rgba(0,0,0,.52);
      border: var(--border);
      backdrop-filter: none;
      box-shadow: 0 14px 34px rgba(0,0,0,.68);
      display:flex;
      gap:10px;
      align-items:center;
      min-height: 56px;
      position: relative;
      overflow:hidden;
      transform: scale(1);
      animation: pulseA 6.0s ease-in-out infinite;
    }
    .w{ animation: pulseA 2.6s ease-in-out infinite; }
    .w:nth-child(2){ animation: pulseB 2.9s ease-in-out infinite; }
    .w:nth-child(3){ animation: pulseB 2.4s ease-in-out infinite; }
    .w:nth-child(4){ animation: pulseA 3.1s ease-in-out infinite; }


    @keyframes pulseA{
      0%,100%{ transform: scale(1); }
      50%{ transform: scale(1.07); }
    }
    @keyframes pulseB{
      0%,100%{ transform: scale(1); }
      50%{ transform: scale(1.09); }
    }

    .w::before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(circle at 25% 0%, rgba(138,43,226,.18), transparent 62%);
      opacity:.45;
      pointer-events:none;
    }
    .w:nth-child(1)::before,.w:nth-child(4)::before{
      background: radial-gradient(circle at 25% 0%, rgba(34,197,94,.14), transparent 62%);
    }

    .w-ico{
      width: 34px; height: 34px;
      border-radius: 12px;
      display:flex; align-items:center; justify-content:center;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 0 18px rgba(0,0,0,.25);
      flex: 0 0 auto;
    }
    .w-ico svg{ width: 18px; height: 18px; }

    .w-top{
      font-size: .70rem;
      color: rgba(255,255,255,.78);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 900;
      margin-bottom: 2px;
      text-shadow: 0 2px 12px rgba(0,0,0,.55);
    }
    .w-bot{
      font-size: .86rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,.55);
    }
    .g{ color: #52f08a; }
    .p{ color: #b28cff; }

    /* ✅ Minimos centrados en 2 columnas (se ven bien, no quedan a la izquierda) */
    .minimos{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 420px;
      margin: 0 auto;
    }
    .minibox{
      border-radius: 18px;
      padding: 12px 10px;
      text-align:center;
      background: rgba(0,0,0,.52);
      border: var(--border);
      backdrop-filter: none;
      box-shadow: 0 14px 34px rgba(0,0,0,.68);
      position: relative;
      overflow:hidden;
    }
    .minibox::before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(circle at 25% 0%, rgba(34,197,94,.12), transparent 62%);
      opacity:.45;
      pointer-events:none;
    }

    .minibox:nth-child(2)::before{
      background: radial-gradient(circle at 25% 0%, rgba(138,43,226,.14), transparent 62%);
    }

    .minibox .t{
      font-size: .66rem;
      color: rgba(255,255,255,.72);
      text-transform: uppercase;
      letter-spacing: .10em;
      margin-bottom: 6px;
      font-weight: 900;
      text-shadow: 0 2px 12px rgba(0,0,0,.55);
    }
    .minibox .n{
      font-size: 1.05rem;
      font-weight: 900;
      color: #fff;
      line-height:1;
      text-shadow: 0 2px 12px rgba(0,0,0,.55);
    }
    .minibox .n span{ color: #52f08a; }

    .foot{
      margin-top: 2px;
      font-size: .72rem;
      color: rgba(255,255,255,.72);
      text-align:center;
      padding: 4px 8px 0;
      text-shadow: 0 2px 12px rgba(0,0,0,.55);
    }

    /* Sticky CTA */
    .sticky{
      position: fixed;
      left:50%;
      transform: translateX(-50%);
      bottom: 12px;
      width: 100%;
      max-width: 520px;
      padding: 0 14px;
      z-index: 50;
    }

    /* sticky usa .btn también */
    .btn-two{
      flex-direction: column;
      gap: 6px;
      padding: 14px 14px 13px;
    }
    .btn-two .btn-main{
      position: relative;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding-left: 32px; /* espacio para el icono */
    }
    .btn-two .btn-sub{
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .92;
      text-shadow: 0 2px 12px rgba(0,0,0,.55);
      display:flex;
      align-items:center;
      gap:6px;
    }
    .btn-two .tick{
      width:16px;height:16px;
      display:inline-block;
      transform: translateY(1px);
    }
    .btn-two .btn-main .ico{
      position:absolute;
      left: 16px;
      width: 22px;
      height: 22px;
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <header>
      <img class="logo" src="logo-ganamos.png" alt="Ganamos">
    </header>

    <div class="safe-zone"></div>

    <div class="stack">
      <div class="bonus-wrap">
        <a class="bonus-btn"
           href="https://wa.me/5491127425140?text=Hola%2C%20quiero%20mi%20bono%20del%2050%25%20mi%20nombre%20es%3A%20"
           target="_blank" rel="noopener noreferrer">
          🔥 ACTIVÁ AHORA TU BONO DEL 50%
        </a>
      </div>

      <div class="widgets">
        <div class="w">
          <div class="w-ico">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#39ff14" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 11H7v-2h4V6h2v7z"/>
            </svg>
          </div>
          <div>
            <div class="w-top">Cargas y retiros</div>
            <div class="w-bot"><span class="g">24 HS</span></div>
          </div>
        </div>

        <div class="w">
          <div class="w-ico">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#b28cff" d="M13 2L3 14h7l-1 8 12-14h-7l-1-6z"/>
            </svg>
          </div>
          <div>
            <div class="w-top">PAGOS</div>
            <div class="w-bot"><span class="p">AL INSTANTE</span></div>
          </div>
        </div>

        <div class="w">
          <div class="w-ico">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#b28cff" d="M7 7h10a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3h-1l-2 2-2-2H12l-2 2-2-2H7a3 3 0 0 1-3-3v-4a3 3 0 0 1 3-3zm1 3h2v2H8v-2zm3 0h2v2h-2v-2zm3 0h2v2h-2v-2zm-6 4h2v2H8v-2zm6 0h2v2h-2v-2z"/>
            </svg>
          </div>
          <div>
            <div class="w-top">JUEGOS</div>
            <div class="w-bot"><span class="p">+5000</span></div>
          </div>
        </div>

        <div class="w">
          <div class="w-ico">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#39ff14" d="M12 2a10 10 0 00-10 10v3a3 3 0 003 3h2v-7H5v-1a7 7 0 0114 0v1h-4v7h4a3 3 0 003-3v-3A10 10 0 0012 2z"/>
            </svg>
          </div>
          <div>
            <div class="w-top">SOPORTE</div>
            <div class="w-bot"><span class="g">24/7</span></div>
          </div>
        </div>
      </div>

      <div class="minimos">
        <div class="minibox">
          <div class="t">Mín. carga</div>
          <div class="n"><span>$</span>3.000</div>
        </div>
        <div class="minibox">
          <div class="t">Mín. retiro</div>
          <div class="n"><span>$</span>6.000</div>
        </div>
      </div>

      <div class="foot">+18 • Jugá responsablemente</div>
    </div>
  </div>

  <div class="sticky">
    <a class="btn btn-green btn-two"
       href="https://wa.me/5491127425140?text=Hola%2C%20quiero%20mi%20bono%20del%2050%25%20mi%20nombre%20es%3A%20"
       target="_blank" rel="noopener noreferrer">

      <span class="btn-main">
        <img class="ico-img" src="wpp.png" alt="WhatsApp">
        HABLAR CON CAJERO
      </span>

      <span class="btn-sub">
        WhatsApp oficial
        <!-- mini check -->
        <svg class="tick" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#0b0b0b" opacity=".18" d="M12 2a10 10 0 100 20 10 10 0 000-20z"/>
          <path fill="#ffffff" d="M10.2 14.6 7.6 12l-1.1 1.1 3.7 3.7L17.5 9.5l-1.1-1.1z"/>
        </svg>
      </span>

    </a>
  </div>
</body>
</html>
